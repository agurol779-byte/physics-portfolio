<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ali Kemal Gurol | Physics Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="particleCanvas"></canvas>

    <header class="hero">
        <div class="top-nav">
            <button id="lang-btn" class="nav-btn">TR</button>
            <button id="theme-btn" class="nav-btn">Light Mode</button>
        </div>
        <div class="hero-content">
            <div class="atom-icon-main">⚛</div>
            <h1 id="main-name">Ali Kemal Gurol</h1>
        </div>
    </header>

    <main class="container">
        <section class="about-card">
            <h2 id="about-title">About Me</h2>
            <div class="quote-container">
                <p id="daily-quote" class="quote">"Exploring the cosmos..."</p>
                <small id="quote-author"></small>
            </div>
            <p id="about-desc" class="description"></p>
            
            <div class="education-info">
                <div class="edu-item">
                    <span class="edu-icon">🎓</span>
                    <span id="edu-school">Bilkent Erzurum Laboratory School (BELS)</span>
                </div>
                <div class="edu-item">
                    <span class="edu-icon">🔬</span>
                    <span id="edu-status">Student & Physics Researcher</span>
                </div>
            </div>
        </section>

        <h2 id="logs-title" class="section-title">My popular science articles</h2>
        <div class="article-grid" id="articles-grid"></div>

        <section class="admin-card" id="admin-panel">
            <div class="admin-form">
                <input type="text" id="post-title" placeholder="Title">
                <input type="text" id="post-platform" placeholder="Platform">
                <input type="text" id="post-url" placeholder="URL">
                <button onclick="addArticle()" class="push-btn">Push to DB</button>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <h3 id="footer-title" class="footer-title">Contact & Professional Network</h3>
            <div class="footer-links">
                <a href="mailto:agurol779@gmail.com" class="footer-link">Email</a>
                <a href="https://www.linkedin.com/in/ali-kemal-g%C3%BCrol-8780b13b9/" target="_blank" class="footer-link">LinkedIn</a>
                <a href="https://medium.com/@aliekemalgurool" target="_blank" class="footer-link">Medium</a>
            </div>
            <p class="copyright">© 2026 Ali Kemal Gürol. Physics Portfolio v2.7.0</p>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
