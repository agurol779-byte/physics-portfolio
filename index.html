<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ali Kemal Gurol | Physics Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <canvas id="particleCanvas"></canvas>

    <header class="hero">
        <div class="hero-content">
            <div class="atom-icon">⚛</div>
            <h1>Ali Kemal Gurol</h1>
            <p class="tagline">Theoretical Physics & Science Communication</p>
            <button id="theme-btn" class="sci-btn">Switch Spectrum</button>
        </div>
    </header>

    <main class="container">
        <h2 class="section-title">Latest Scientific Logs</h2>
        <div class="article-grid" id="articles-grid">
            </div>

        <section class="admin-card" id="admin-panel">
            <div class="admin-header">
                <span class="admin-title">RESEARCH MANAGEMENT (ADMIN)</span>
                <div class="header-line"></div>
            </div>
            
            <div class="admin-form">
                <div class="input-group">
                    <input type="text" id="post-title" placeholder="Makale Başlığı">
                </div>
                <div class="input-group">
                    <input type="text" id="post-platform" placeholder="Yayınlanan Platform (örn: Medium, Tübitak)">
                </div>
                <div class="input-group">
                    <input type="text" id="post-url" placeholder="Makale URL Adresi (https://...)">
                </div>
                <button onclick="addArticle()" class="push-btn">Push to Database</button>
            </div>
        </section>

        <footer class="footer">
            <p>// Quantum-encrypted: <a href="mailto:agurol779@gmail.com">agurol779@gmail.com</a></p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
